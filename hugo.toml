baseURL = 'https://latencylog.tech/'
languageCode = 'en-us'
title = 'Latency Log'
theme = 'PaperMod'

[params]
  author = 'Basil Eldho'
  description = "Basil Eldho's technical notes on distributed systems, Go, and backend engineering"
  
  # PaperMod settings
  defaultTheme = "auto"  # auto, light, dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.homeInfoParams]
    Title = ""
    Content = """
<div style="display: flex; align-items: start; gap: 2rem;">
<div style="flex: 1;">

Hi, I'm **Basil Eldho**. 

I write about distributed systems, Go, and backend engineering.

**What I'm doing now:**
- Pursuing MS in Computer Science at SUNY Binghamton
- Transitioning to lower-level systems — OS and networking
- Reading *Computer Networking: A Top-Down Approach*
- Writing about system internals and technical challenges

*Last updated: December 2025*

</div>
<div style="flex-shrink: 0;">
<img src="/logo.svg" alt="Basil Eldho" width="200" height="200" style="border-radius: 8px;" />
</div>
</div>
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/basil-eldho"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/basil-eldho/"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:basileljol@gmail.com"

  [[params.socialIcons]]
    name = "Resume"
    url = "https://drive.google.com/file/d/13Fj68DJEmBcoSRQ6tzREr_7bScI42L0U/view"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'monokai'
    lineNos = true
    lineNumbersInTable = false

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30
